name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finance
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/finance?schema=public
      SESSION_SECRET: ci-secret-needs-to-be-at-least-32-bytes-long-okay
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile || pnpm install
      - run: pnpm --filter @ft/shared build
      - run: pnpm --filter @ft/api exec prisma generate
      - run: pnpm --filter @ft/api exec prisma migrate deploy
      - run: pnpm -r run typecheck
      - run: pnpm -r run lint
      - run: pnpm -r run test
      - run: pnpm --filter @ft/api build
      - run: pnpm --filter @ft/web build
